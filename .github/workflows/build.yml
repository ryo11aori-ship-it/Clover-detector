name: Build and Test Clover Finder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --name fourleaf_finder main.py

    - name: Run Clover Finder on Sample Image
      run: |
        # リポジトリ直下の clover.JPG を解析。--debug で中間画像も出力する。
        # min-conf は既定 0.60。誤検出が出る場合は上げ、取りこぼす場合は下げる。
        ./dist/fourleaf_finder.exe clover.JPG -o clover_marked.png --debug

    - name: Upload Exe
      uses: actions/upload-artifact@v4
      with:
        name: fourleaf_finder_exe
        path: dist/fourleaf_finder.exe

    - name: Upload Result Image
      uses: actions/upload-artifact@v4
      with:
        name: detection_result_image
        path: clover_marked.png

    - name: Upload Debug Images
      uses: actions/upload-artifact@v4
      with:
        name: debug_images
        path: |
          debug_mask.png
          debug_dist.png
          debug_candidates.png
        if-no-files-found: ignore
